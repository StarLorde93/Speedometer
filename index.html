<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="theme-color" content="#020617">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<title>Speedometer</title>

<style>
* {
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: #020617;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.app {
  height: 100dvh;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  background:
    radial-gradient(circle at top, rgba(56,189,248,.18), transparent 36%),
    linear-gradient(180deg, #111827, #020617);
}

.speed-card {
  text-align: center;
  padding-top: 24px;
}

.speed {
  font-size: clamp(82px, 24vw, 132px);
  font-weight: 850;
  letter-spacing: -4px;
  line-height: .9;
}

.unit {
  margin-top: 8px;
  font-size: 18px;
  opacity: .55;
}

.btn {
  margin-top: 22px;
  padding: 14px 34px;
  border: 0;
  border-radius: 999px;
  color: white;
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, #22d3ee, #6366f1);
  box-shadow: 0 14px 40px rgba(56,189,248,.28);
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.info-card {
  min-height: 88px;
  padding: 15px;
  border-radius: 24px;
  background: rgba(255,255,255,.075);
  border: 1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(18px);
}

.label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  opacity: .45;
  margin-bottom: 10px;
}

.value {
  font-size: 16px;
  font-weight: 750;
  line-height: 1.25;
}

.map-card {
  position: relative;
  flex: 1;
  min-height: 260px;
  border-radius: 30px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.13);
  box-shadow: 0 22px 54px rgba(0,0,0,.32);
}

#map {
  width: 100%;
  height: 100%;
}

.map-label {
  position: absolute;
  z-index: 999;
  left: 14px;
  top: 14px;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(2,6,23,.76);
  backdrop-filter: blur(12px);
}

.user-dot {
  width: 22px;
  height: 22px;
  background: #0b84ff;
  border: 4px solid white;
  border-radius: 50%;
  box-shadow: 0 0 0 14px rgba(11,132,255,.2);
}

.leaflet-control-attribution {
  display: none;
}
</style>
</head>

<body>

<div class="app">
  <section class="speed-card">
    <div id="speed" class="speed">0.00</div>
    <div class="unit">km/h</div>
    <button id="startBtn" class="btn" onclick="startTracking()">Start Tracking</button>
  </section>

  <section class="info-grid">
    <div class="info-card">
      <div class="label">Nearest Station</div>
      <div id="station" class="value">Waiting...</div>
    </div>

    <div class="info-card">
      <div class="label">Current Location</div>
      <div id="location" class="value">Waiting...</div>
    </div>
  </section>

  <section class="map-card">
    <div class="map-label">Live map</div>
    <div id="map"></div>
  </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let lastSpeed = 0;
let watchId = null;
let map = null;
let userMarker = null;
let accuracyCircle = null;
let lastLookupTime = 0;
let lastLat = null;
let lastLon = null;

const speedEl = document.getElementById("speed");
const stationEl = document.getElementById("station");
const locationEl = document.getElementById("location");
const startBtn = document.getElementById("startBtn");

function initMap(lat = 28.6139, lon = 77.2090) {
  map = L.map("map", {
    zoomControl: false,
    attributionControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    touchZoom: false
  }).setView([lat, lon], 17);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);
}

function startTracking() {
  if (!navigator.geolocation) {
    startBtn.textContent = "GPS not supported";
    return;
  }

  startBtn.textContent = "Tracking";
  startBtn.disabled = true;

  if (!map) initMap();

  watchId = navigator.geolocation.watchPosition(
    updatePosition,
    handleError,
    {
      enableHighAccuracy: true,
      maximumAge: 500,
      timeout: 15000
    }
  );
}

function updatePosition(position) {
  const { latitude, longitude, speed, accuracy } = position.coords;

  updateSpeed(speed);
  updateLiveMap(latitude, longitude, accuracy);

  const now = Date.now();

  if (lastLookupTime === 0 || now - lastLookupTime > 45000) {
    updateLocationInfo(latitude, longitude);
    lastLookupTime = now;
  }

  lastLat = latitude;
  lastLon = longitude;
}

function updateSpeed(speed) {
  let kmh = 0;

  if (speed !== null && !isNaN(speed)) {
    kmh = Math.max(0, speed * 3.6);
  }

  lastSpeed += (kmh - lastSpeed) * 0.28;

  speedEl.textContent = lastSpeed < 1
    ? lastSpeed.toFixed(2)
    : Math.round(lastSpeed);
}

function updateLiveMap(lat, lon, accuracy) {
  const pos = [lat, lon];

  if (!map) initMap(lat, lon);

  if (!userMarker) {
    userMarker = L.marker(pos, {
      icon: L.divIcon({
        className: "",
        html: '<div class="user-dot"></div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      })
    }).addTo(map);

    accuracyCircle = L.circle(pos, {
      radius: accuracy || 20,
      fillOpacity: 0.12,
      opacity: 0.2
    }).addTo(map);

    map.setView(pos, 17);
    return;
  }

  userMarker.setLatLng(pos);
  accuracyCircle.setLatLng(pos);
  accuracyCircle.setRadius(accuracy || 20);

  map.panTo(pos, {
    animate: true,
    duration: 0.6
  });
}

async function updateLocationInfo(lat, lon) {
  stationEl.textContent = "Searching...";
  locationEl.textContent = "Detecting...";

  await Promise.allSettled([
    updateCurrentLocation(lat, lon),
    updateNearestStation(lat, lon)
  ]);
}

async function updateCurrentLocation(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=15&addressdetails=1`;
    const res = await fetch(url);
    const data = await res.json();
    const a = data.address || {};

    locationEl.textContent =
      a.suburb ||
      a.neighbourhood ||
      a.quarter ||
      a.village ||
      a.town ||
      a.city ||
      a.state_district ||
      "Location found";
  } catch {
    locationEl.textContent = "Location unavailable";
  }
}

async function updateNearestStation(lat, lon) {
  const query = `
    [out:json][timeout:30];
    (
      node(around:20000,${lat},${lon})["railway"="station"];
      node(around:20000,${lat},${lon})["railway"="halt"];
      way(around:20000,${lat},${lon})["railway"="station"];
      relation(around:20000,${lat},${lon})["railway"="station"];
    );
    out center tags;
  `;

  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: query
    });

    const data = await res.json();

    const stations = (data.elements || [])
      .map(item => {
        const sLat = item.lat || item.center?.lat;
        const sLon = item.lon || item.center?.lon;

        return {
          name: item.tags?.name || item.tags?.["name:en"] || "Nearby station",
          distance: getDistanceKm(lat, lon, sLat, sLon)
        };
      })
      .filter(item => item.name && !isNaN(item.distance))
      .sort((a, b) => a.distance - b.distance);

    stationEl.textContent = stations[0]?.name || "Station not found";
  } catch {
    stationEl.textContent = "Station unavailable";
  }
}

function getDistanceKm(lat1, lon1, lat2, lon2) {
  if (!lat2 || !lon2) return NaN;

  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function toRad(value) {
  return value * Math.PI / 180;
}

function handleError(err) {
  startBtn.disabled = false;
  startBtn.textContent =
    err.code === 1 ? "Allow Location" :
    err.code === 2 ? "Location Error" :
    "Try Again";
}
</script>

</body>
</html>
