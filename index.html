<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="theme-color" content="#020617">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Speedometer</title>

<style>
* {
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overscroll-behavior: none;
  overflow: hidden;
  background: #020617;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background:
    radial-gradient(circle at top, rgba(56,189,248,.18), transparent 36%),
    linear-gradient(180deg, #111827, #020617);
}

.app {
  height: 100dvh;
  padding: env(safe-area-inset-top) 18px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  padding-left: 18px;
  padding-right: 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.speed-card {
  text-align: center;
  padding-top: 34px;
}

.speed {
  font-size: clamp(82px, 24vw, 132px);
  font-weight: 850;
  letter-spacing: -4px;
  line-height: .9;
}

.unit {
  margin-top: 10px;
  font-size: 18px;
  opacity: .55;
}

.btn {
  margin-top: 24px;
  padding: 14px 34px;
  border: none;
  border-radius: 999px;
  color: white;
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, #22d3ee, #6366f1);
  box-shadow: 0 14px 40px rgba(56,189,248,.28);
}

.btn:active {
  transform: scale(.96);
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.info-card {
  min-height: 88px;
  padding: 15px;
  border-radius: 24px;
  background: rgba(255,255,255,.075);
  border: 1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(18px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 14px 34px rgba(0,0,0,.22);
}

.label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  opacity: .45;
  margin-bottom: 10px;
}

.value {
  font-size: 16px;
  font-weight: 750;
  line-height: 1.25;
  word-break: break-word;
}

.map-card {
  position: relative;
  flex: 1;
  min-height: 230px;
  border-radius: 30px;
  overflow: hidden;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.13);
  box-shadow: 0 22px 54px rgba(0,0,0,.32);
}

.map-card iframe {
  width: 100%;
  height: 100%;
  border: 0;
  pointer-events: none;
}

.map-label {
  position: absolute;
  left: 14px;
  top: 14px;
  z-index: 2;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(2,6,23,.76);
  backdrop-filter: blur(12px);
}

@media (max-height: 720px) {
  .speed-card { padding-top: 18px; }
  .map-card { min-height: 170px; }
}
</style>
</head>

<body>

<div class="app">
  <section class="speed-card">
    <div id="speed" class="speed">0.00</div>
    <div class="unit">km/h</div>
    <button id="startBtn" class="btn" onclick="startTracking()">Start Tracking</button>
  </section>

  <section class="info-grid">
    <div class="info-card">
      <div class="label">Nearest Station</div>
      <div id="station" class="value">Waiting...</div>
    </div>

    <div class="info-card">
      <div class="label">Current Location</div>
      <div id="location" class="value">Waiting...</div>
    </div>
  </section>

  <section class="map-card">
    <div class="map-label">Location preview</div>
    <iframe id="map" loading="lazy"></iframe>
  </section>
</div>

<script>
let lastSpeed = 0;
let watchId = null;
let lastLookupTime = 0;
let lastMapLat = null;
let lastMapLon = null;

const speedEl = document.getElementById("speed");
const stationEl = document.getElementById("station");
const locationEl = document.getElementById("location");
const mapEl = document.getElementById("map");
const startBtn = document.getElementById("startBtn");

function startTracking() {
  if (!navigator.geolocation) {
    startBtn.textContent = "GPS not supported";
    return;
  }

  startBtn.textContent = "Tracking";
  startBtn.disabled = true;

  watchId = navigator.geolocation.watchPosition(
    updatePosition,
    handleError,
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 15000
    }
  );
}

function updatePosition(position) {
  const { latitude, longitude, speed } = position.coords;

  updateSpeed(speed);

  const now = Date.now();

  if (!lastMapLat || getDistanceKm(latitude, longitude, lastMapLat, lastMapLon) > 0.15) {
    updateMap(latitude, longitude);
    lastMapLat = latitude;
    lastMapLon = longitude;
  }

  if (lastLookupTime === 0 || now - lastLookupTime > 45000) {
    updateLocationInfo(latitude, longitude);
    lastLookupTime = now;
  }
}

function updateSpeed(speed) {
  let kmh = 0;

  if (speed !== null && !isNaN(speed)) {
    kmh = Math.max(0, speed * 3.6);
  }

  lastSpeed += (kmh - lastSpeed) * 0.22;

  speedEl.textContent = lastSpeed < 1
    ? lastSpeed.toFixed(2)
    : Math.round(lastSpeed);
}

async function updateLocationInfo(lat, lon) {
  stationEl.textContent = "Searching...";
  locationEl.textContent = "Detecting...";

  await Promise.allSettled([
    updateCurrentLocation(lat, lon),
    updateNearestStation(lat, lon)
  ]);
}

async function updateCurrentLocation(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=15&addressdetails=1`;
    const res = await fetch(url);
    const data = await res.json();
    const a = data.address || {};

    const place =
      a.suburb ||
      a.neighbourhood ||
      a.quarter ||
      a.village ||
      a.town ||
      a.city ||
      a.state_district ||
      a.state ||
      "Location found";

    locationEl.textContent = place;
  } catch {
    locationEl.textContent = "Location unavailable";
  }
}

async function updateNearestStation(lat, lon) {
  const query = `
    [out:json][timeout:30];
    (
      node(around:20000,${lat},${lon})["railway"="station"];
      node(around:20000,${lat},${lon})["railway"="halt"];
      node(around:20000,${lat},${lon})["public_transport"="station"];
      way(around:20000,${lat},${lon})["railway"="station"];
      way(around:20000,${lat},${lon})["railway"="halt"];
      way(around:20000,${lat},${lon})["public_transport"="station"];
      relation(around:20000,${lat},${lon})["railway"="station"];
      relation(around:20000,${lat},${lon})["public_transport"="station"];
    );
    out center tags;
  `;

  const servers = [
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter",
    "https://overpass.openstreetmap.ru/api/interpreter"
  ];

  for (const server of servers) {
    try {
      const res = await fetch(server, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=UTF-8"
        },
        body: query
      });

      if (!res.ok) continue;

      const data = await res.json();

      const stations = (data.elements || [])
        .map(item => {
          const sLat = item.lat || item.center?.lat;
          const sLon = item.lon || item.center?.lon;

          return {
            name:
              item.tags?.name ||
              item.tags?.["name:en"] ||
              item.tags?.operator ||
              "Nearby station",
            distance: getDistanceKm(lat, lon, sLat, sLon)
          };
        })
        .filter(item => item.name && !isNaN(item.distance))
        .sort((a, b) => a.distance - b.distance);

      if (stations.length > 0) {
        stationEl.textContent = stations[0].name;
        return;
      }
    } catch {}
  }

  try {
    const delta = 0.15;
    const left = lon - delta;
    const right = lon + delta;
    const top = lat + delta;
    const bottom = lat - delta;

    const url =
      `https://nominatim.openstreetmap.org/search?format=jsonv2&q=railway%20station&bounded=1&limit=10&viewbox=${left},${top},${right},${bottom}`;

    const res = await fetch(url);
    const data = await res.json();

    const nearest = (data || [])
      .map(item => ({
        name: item.name || item.display_name?.split(",")[0] || "Nearby station",
        distance: getDistanceKm(lat, lon, parseFloat(item.lat), parseFloat(item.lon))
      }))
      .filter(item => item.name && !isNaN(item.distance))
      .sort((a, b) => a.distance - b.distance)[0];

    stationEl.textContent = nearest?.name || "Station not found";
  } catch {
    stationEl.textContent = "Station not found";
  }
}

function updateMap(lat, lon) {
  const delta = 0.0045;
  const left = lon - delta;
  const right = lon + delta;
  const top = lat + delta;
  const bottom = lat - delta;

  mapEl.src =
    `https://www.openstreetmap.org/export/embed.html?bbox=${left},${bottom},${right},${top}&layer=mapnik&marker=${lat},${lon}`;
}

function getDistanceKm(lat1, lon1, lat2, lon2) {
  if (!lat2 || !lon2) return NaN;

  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function toRad(value) {
  return value * Math.PI / 180;
}

function handleError(err) {
  startBtn.disabled = false;
  startBtn.textContent =
    err.code === 1 ? "Allow Location" :
    err.code === 2 ? "Location Error" :
    "Try Again";
}
</script>

</body>
</html>
