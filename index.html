<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="theme-color" content="#020617">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<title>Speedometer</title>

<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#020617;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{height:100dvh;padding:18px;display:flex;flex-direction:column;gap:14px;background:radial-gradient(circle at top,rgba(56,189,248,.18),transparent 36%),linear-gradient(180deg,#111827,#020617)}
.speed-card{text-align:center;padding-top:18px}
.speed{font-size:clamp(78px,22vw,120px);font-weight:850;letter-spacing:-4px;line-height:.9}
.unit{margin-top:8px;font-size:18px;opacity:.55}
.btn{margin-top:18px;padding:13px 30px;border:0;border-radius:999px;color:white;font-size:15px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#6366f1);box-shadow:0 14px 40px rgba(56,189,248,.28)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{min-height:82px;padding:14px;border-radius:22px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(18px)}
.destination-card{min-height:74px}
.label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.45;margin-bottom:9px}
.value{font-size:15px;font-weight:750;line-height:1.25}
.small{margin-top:5px;font-size:12px;opacity:.55}
.map-card{position:relative;flex:1;min-height:230px;border-radius:30px;overflow:hidden;border:1px solid rgba(255,255,255,.13);box-shadow:0 22px 54px rgba(0,0,0,.32)}
#map{width:100%;height:100%}
.map-label{position:absolute;z-index:999;left:14px;top:14px;padding:8px 12px;border-radius:999px;font-size:12px;background:rgba(2,6,23,.76);backdrop-filter:blur(12px)}
.user-dot{width:22px;height:22px;background:#0b84ff;border:4px solid white;border-radius:50%;box-shadow:0 0 0 14px rgba(11,132,255,.2)}
.modal{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(2,6,23,.72);backdrop-filter:blur(14px)}
.modal-box{width:100%;max-width:390px;padding:20px;border-radius:28px;background:#0f172a;border:1px solid rgba(255,255,255,.14)}
.modal-title{font-size:20px;font-weight:800;margin-bottom:14px}
.option{width:100%;margin-top:10px;padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:white;font-size:15px;text-align:left}
.option.selected{border-color:#38bdf8;background:linear-gradient(135deg,rgba(34,211,238,.28),rgba(99,102,241,.22));box-shadow:0 0 0 2px rgba(56,189,248,.18)}
.input{width:100%;margin-top:12px;padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.09);color:white;font-size:15px;outline:none}
.input:focus{border-color:white}
.search-block{display:none}
.results{margin-top:12px;display:none;max-height:220px;overflow:auto}
.result{padding:12px;border-radius:16px;background:rgba(255,255,255,.07);margin-bottom:8px}
.result-title{font-weight:750;font-size:14px}
.result-sub{font-size:12px;opacity:.55;margin-top:4px}
.leaflet-control-attribution{display:none}
.leaflet-control-zoom{right:12px!important;bottom:12px!important;left:auto!important;top:auto!important}
</style>
</head>

<body>

<div class="app">
  <section class="speed-card">
    <div id="speed" class="speed">0.00</div>
    <div class="unit">km/h</div>
    <button id="startBtn" class="btn" onclick="startTracking()">Start Tracking</button>
  </section>

  <section class="grid">
    <div class="card">
      <div class="label">Nearest Station</div>
      <div id="station" class="value">Waiting...</div>
    </div>

    <div class="card">
      <div class="label">Current Location</div>
      <div id="location" class="value">Waiting...</div>
    </div>
  </section>

  <section class="card destination-card" onclick="openDestinationModal()">
    <div class="label">Destination</div>
    <div id="destinationName" class="value">Select destination</div>
    <div id="destinationInfo" class="small">Tap to choose railway station or location</div>
  </section>

  <section class="map-card">
    <div class="map-label">Live map</div>
    <div id="map"></div>
  </section>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <div class="modal-title">Select destination</div>

    <button id="railBtn" class="option" onclick="chooseDestinationType('rail')">🚆 Railway station / junction</button>
    <div id="railSearchBlock" class="search-block">
      <input id="railInput" class="input" placeholder="Search station or junction in India" oninput="debouncedSearch('rail')">
      <div id="railResults" class="results"></div>
    </div>

    <button id="vehicleBtn" class="option" onclick="chooseDestinationType('vehicle')">🚗 Location</button>
    <div id="vehicleSearchBlock" class="search-block">
      <input id="vehicleInput" class="input" placeholder="Search location in India" oninput="debouncedSearch('vehicle')">
      <div id="vehicleResults" class="results"></div>
    </div>

    <button class="option" onclick="closeDestinationModal()">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let lastSpeed = 0;
let lastValidSpeed = 0;
let speedSamples = [];
let watchId = null;

let map = null;
let userMarker = null;
let accuracyCircle = null;
let routeLine = null;
let destinationMarker = null;

let lastLookupTime = 0;
let lastLat = null;
let lastLon = null;
let lastPositionTime = null;

let destinationType = null;
let destination = null;
let nearestStationObj = null;
let searchTimer = null;
let latestResults = [];

const speedEl = document.getElementById("speed");
const stationEl = document.getElementById("station");
const locationEl = document.getElementById("location");
const startBtn = document.getElementById("startBtn");
const destinationNameEl = document.getElementById("destinationName");
const destinationInfoEl = document.getElementById("destinationInfo");

const railBtn = document.getElementById("railBtn");
const vehicleBtn = document.getElementById("vehicleBtn");
const railSearchBlock = document.getElementById("railSearchBlock");
const vehicleSearchBlock = document.getElementById("vehicleSearchBlock");
const railInput = document.getElementById("railInput");
const vehicleInput = document.getElementById("vehicleInput");
const railResults = document.getElementById("railResults");
const vehicleResults = document.getElementById("vehicleResults");

function initMap(lat = 28.6139, lon = 77.2090) {
  map = L.map("map", {
    zoomControl: false,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: true,
    doubleClickZoom: true,
    touchZoom: true
  }).setView([lat, lon], 17);

  L.control.zoom({ position: "bottomright" }).addTo(map);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);
}

function startTracking() {
  if (!navigator.geolocation) {
    startBtn.textContent = "GPS not supported";
    return;
  }

  startBtn.textContent = "Tracking";
  startBtn.disabled = true;

  if (!map) initMap();

  watchId = navigator.geolocation.watchPosition(updatePosition, handleError, {
    enableHighAccuracy: true,
    maximumAge: 300,
    timeout: 12000
  });
}

function updatePosition(position) {
  const { latitude, longitude, speed, accuracy } = position.coords;
  const nowTime = position.timestamp;

  const calculatedSpeed = calculateReliableSpeed(latitude, longitude, speed, accuracy, nowTime);

  updateSpeed(calculatedSpeed);
  updateLiveMap(latitude, longitude, accuracy);

  const now = Date.now();

  if (lastLookupTime === 0 || now - lastLookupTime > 45000) {
    updateLocationInfo(latitude, longitude);
    lastLookupTime = now;
  }

  if (destination) updateDestinationProgress(latitude, longitude);

  lastLat = latitude;
  lastLon = longitude;
  lastPositionTime = nowTime;
}

function calculateReliableSpeed(lat, lon, gpsSpeed, accuracy, timestamp) {
  let gpsKmh = null;

  if (gpsSpeed !== null && !isNaN(gpsSpeed)) gpsKmh = Math.max(0, gpsSpeed * 3.6);

  let derivedKmh = null;

  if (lastLat !== null && lastLon !== null && lastPositionTime !== null) {
    const seconds = (timestamp - lastPositionTime) / 1000;
    const distanceKm = getDistanceKm(lastLat, lastLon, lat, lon);

    if (seconds > 0.8 && seconds < 10 && accuracy <= 60) {
      derivedKmh = (distanceKm / seconds) * 3600;
    }
  }

  let candidate = gpsKmh ?? derivedKmh ?? lastValidSpeed;

  if (derivedKmh !== null && gpsKmh !== null) candidate = gpsKmh * 0.7 + derivedKmh * 0.3;

  if (accuracy > 80) candidate = lastValidSpeed;
  if (candidate > 180) candidate = lastValidSpeed;
  if (Math.abs(candidate - lastValidSpeed) > 35 && lastValidSpeed < 40) candidate = lastValidSpeed;
  if (candidate < 1.2) candidate = 0;

  speedSamples.push(candidate);
  if (speedSamples.length > 5) speedSamples.shift();

  const sorted = [...speedSamples].sort((a, b) => a - b);
  const median = sorted[Math.floor(sorted.length / 2)];

  lastValidSpeed = median < 1.2 ? 0 : median;
  return lastValidSpeed;
}

function updateSpeed(kmh) {
  if (kmh === 0) {
    lastSpeed += (0 - lastSpeed) * 0.6;
    if (lastSpeed < 0.12) lastSpeed = 0;
  } else {
    lastSpeed += (kmh - lastSpeed) * 0.35;
  }

  speedEl.textContent = lastSpeed < 1 ? lastSpeed.toFixed(2) : Math.round(lastSpeed);
}

function updateLiveMap(lat, lon, accuracy) {
  const pos = [lat, lon];

  if (!map) initMap(lat, lon);

  if (!userMarker) {
    userMarker = L.marker(pos, {
      icon: L.divIcon({
        className: "",
        html: '<div class="user-dot"></div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      })
    }).addTo(map);

    accuracyCircle = L.circle(pos, {
      radius: accuracy || 20,
      fillOpacity: 0.12,
      opacity: 0.2
    }).addTo(map);

    map.setView(pos, 17);
    return;
  }

  userMarker.setLatLng(pos);
  accuracyCircle.setLatLng(pos);
  accuracyCircle.setRadius(accuracy || 20);

  map.panTo(pos, { animate: true, duration: 0.5 });
}

async function updateLocationInfo(lat, lon) {
  stationEl.textContent = "Searching...";
  locationEl.textContent = "Detecting...";

  await Promise.allSettled([
    updateCurrentLocation(lat, lon),
    updateNearestStation(lat, lon)
  ]);
}

async function updateCurrentLocation(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=15&addressdetails=1`;
    const res = await fetch(url);
    const data = await res.json();
    const a = data.address || {};

    locationEl.textContent =
      a.suburb || a.neighbourhood || a.quarter || a.village ||
      a.town || a.city || a.state_district || "Location found";
  } catch {
    locationEl.textContent = "Location unavailable";
  }
}

async function updateNearestStation(lat, lon) {
  const query = `
    [out:json][timeout:30];
    (
      node(around:25000,${lat},${lon})["railway"="station"];
      node(around:25000,${lat},${lon})["railway"="halt"];
      way(around:25000,${lat},${lon})["railway"="station"];
      relation(around:25000,${lat},${lon})["railway"="station"];
    );
    out center tags;
  `;

  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: query
    });

    const data = await res.json();

    const stations = (data.elements || [])
      .map(item => {
        const sLat = item.lat || item.center?.lat;
        const sLon = item.lon || item.center?.lon;
        return {
          name: item.tags?.name || item.tags?.["name:en"] || "Nearby station",
          lat: sLat,
          lon: sLon,
          distance: getDistanceKm(lat, lon, sLat, sLon)
        };
      })
      .filter(item => item.name && !isNaN(item.distance))
      .sort((a, b) => a.distance - b.distance);

    if (stations.length) {
      nearestStationObj = stations[0];
      stationEl.textContent = nearestStationObj.name;
    } else {
      nearestStationObj = null;
      stationEl.textContent = "Station not found";
    }
  } catch {
    nearestStationObj = null;
    stationEl.textContent = "Station unavailable";
  }
}

function openDestinationModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeDestinationModal() {
  document.getElementById("modal").style.display = "none";
}

function chooseDestinationType(type) {
  destinationType = type;

  railBtn.classList.toggle("selected", type === "rail");
  vehicleBtn.classList.toggle("selected", type === "vehicle");

  railSearchBlock.style.display = type === "rail" ? "block" : "none";
  vehicleSearchBlock.style.display = type === "vehicle" ? "block" : "none";

  railResults.style.display = "none";
  vehicleResults.style.display = "none";
  railResults.innerHTML = "";
  vehicleResults.innerHTML = "";

  if (type === "rail") {
    railInput.value = "";
    setTimeout(() => railInput.focus(), 100);
  } else {
    vehicleInput.value = "";
    setTimeout(() => vehicleInput.focus(), 100);
  }
}

function debouncedSearch(type) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => searchDestinationInline(type), 300);
}

async function searchDestinationInline(type) {
  const input = type === "rail" ? railInput : vehicleInput;
  const resultsBox = type === "rail" ? railResults : vehicleResults;
  const q = input.value.trim();

  if (q.length < 2) {
    resultsBox.style.display = "none";
    resultsBox.innerHTML = "";
    return;
  }

  resultsBox.style.display = "block";
  resultsBox.innerHTML = `<div class="result"><div class="result-title">Searching...</div></div>`;

  try {
    let results = [];

    if (type === "rail") {
      results = await searchRailStations(q);
    } else {
      results = await searchLocations(q);
    }

    if (!results.length) {
      resultsBox.innerHTML = `<div class="result"><div class="result-title">No matching results</div></div>`;
      return;
    }

    latestResults = results;

    resultsBox.innerHTML = results.map((item, index) => `
      <div class="result" onclick="selectDestination(${index})">
        <div class="result-title">${escapeHtml(item.name)}</div>
        <div class="result-sub">
          ${item.distance < 99999 ? item.distance.toFixed(1) + " km away • " : ""}
          ${escapeHtml(item.display)}
        </div>
      </div>
    `).join("");
  } catch {
    resultsBox.innerHTML = `<div class="result"><div class="result-title">Search failed</div></div>`;
  }
}

async function searchRailStations(q) {
  const queries = [
    `${q} railway station India`,
    `${q} junction railway station India`,
    `${q} jn railway station India`,
    `${q} station India`
  ];

  let all = [];

  for (const query of queries) {
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=10&countrycodes=in&q=${encodeURIComponent(query)}`;
    const res = await fetch(url);
    const data = await res.json();
    all.push(...data);
  }

  return cleanAndRankResults(all, q, "rail");
}

async function searchLocations(q) {
  const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=15&countrycodes=in&q=${encodeURIComponent(q + " India")}`;
  const res = await fetch(url);
  const data = await res.json();

  return cleanAndRankResults(data, q, "vehicle");
}

function cleanAndRankResults(data, q, type) {
  const seen = new Set();

  let items = data.map(item => {
    const name = item.name || item.display_name.split(",")[0];
    const display = item.display_name || name;
    const lat = parseFloat(item.lat);
    const lon = parseFloat(item.lon);
    const key = `${name}-${lat.toFixed(3)}-${lon.toFixed(3)}`;

    return {
      raw: item,
      key,
      name,
      display,
      lat,
      lon,
      className: item.class || "",
      typeName: item.type || "",
      distance: lastLat && lastLon ? getDistanceKm(lastLat, lastLon, lat, lon) : 99999
    };
  }).filter(item => {
    if (!item.name || !isFinite(item.lat) || !isFinite(item.lon)) return false;
    if (seen.has(item.key)) return false;
    seen.add(item.key);

    if (type === "rail") {
      return /railway|station|junction|jn\b|junct|halt/i.test(item.display + " " + item.name) ||
             item.className === "railway";
    }

    return item.className !== "railway" &&
           !/railway station|train station|junction railway/i.test(item.display);
  });

  items = items.sort((a, b) => {
    const scoreA = fuzzyScore(q, a.name + " " + a.display);
    const scoreB = fuzzyScore(q, b.name + " " + b.display);
    return (scoreB - scoreA) || (a.distance - b.distance);
  });

  return items.slice(0, 6);
}

function selectDestination(index) {
  const item = latestResults[index];
  if (!item) return;

  clearRouteOnly();

  destination = {
    type: destinationType,
    name: item.name,
    lat: item.lat,
    lon: item.lon
  };

  destinationNameEl.textContent = destination.name;
  destinationInfoEl.textContent = "Calculating...";

  if (destinationMarker) map.removeLayer(destinationMarker);
  destinationMarker = L.marker([destination.lat, destination.lon]).addTo(map);

  closeDestinationModal();

  if (lastLat && lastLon) updateDestinationProgress(lastLat, lastLon);
}

async function updateDestinationProgress(lat, lon) {
  if (!destination) return;

  if (destination.type === "vehicle") {
    await updateVehicleRoute(lat, lon);
  } else {
    updateRailEta(lat, lon);
  }
}

async function updateVehicleRoute(lat, lon) {
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${lon},${lat};${destination.lon},${destination.lat}?overview=full&geometries=geojson`;

    const res = await fetch(url);
    const data = await res.json();
    const route = data.routes?.[0];

    if (!route) {
      clearRouteOnly();
      destinationInfoEl.textContent = "Route unavailable";
      return;
    }

    const kmLeft = route.distance / 1000;
    const etaMin = route.duration / 60;

    destinationInfoEl.textContent = `${kmLeft.toFixed(1)} km left • ${formatEta(etaMin)}`;

    const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
    clearRouteOnly();

    routeLine = L.polyline(coords, { weight: 5, opacity: 0.75 }).addTo(map);
  } catch {
    clearRouteOnly();
    destinationInfoEl.textContent = "Route unavailable";
  }
}

function updateRailEta(lat, lon) {
  clearRouteOnly();

  const startLat = nearestStationObj?.lat || lat;
  const startLon = nearestStationObj?.lon || lon;

  const kmLeft = getDistanceKm(startLat, startLon, destination.lat, destination.lon);
  const avg = getAverageSpeed();

  let eta = "ETA unavailable";

  if (avg > 2) eta = formatEta((kmLeft / avg) * 60);

  destinationInfoEl.textContent = `${kmLeft.toFixed(1)} km left • ${eta}`;
}

function clearRouteOnly() {
  if (routeLine && map) {
    map.removeLayer(routeLine);
    routeLine = null;
  }
}

function getAverageSpeed() {
  const moving = speedSamples.filter(s => s > 2);
  if (!moving.length) return 0;
  return moving.reduce((a, b) => a + b, 0) / moving.length;
}

function fuzzyScore(query, text) {
  query = normalizeText(query);
  text = normalizeText(text);

  if (text.startsWith(query)) return 200;
  if (text.includes(query)) return 160;

  let score = 0;
  let qIndex = 0;

  for (let i = 0; i < text.length && qIndex < query.length; i++) {
    if (text[i] === query[qIndex]) {
      score += 12;
      qIndex++;
    }
  }

  const completionBonus = qIndex === query.length ? 80 : 0;
  return score + completionBonus - Math.abs(text.length - query.length) * 0.2;
}

function normalizeText(text) {
  return String(text)
    .toLowerCase()
    .replace(/\bjunction\b/g, "jn")
    .replace(/\bjn\.\b/g, "jn")
    .replace(/[^a-z0-9]/g, "");
}

function formatEta(minutes) {
  if (!isFinite(minutes)) return "ETA unavailable";
  if (minutes < 1) return "<1 min";

  const h = Math.floor(minutes / 60);
  const m = Math.round(minutes % 60);

  if (h <= 0) return `${m} min`;
  return `${h}h ${m}m`;
}

function getDistanceKm(lat1, lon1, lat2, lon2) {
  if (!lat2 || !lon2) return NaN;

  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function toRad(value) {
  return value * Math.PI / 180;
}

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}

function handleError(err) {
  startBtn.disabled = false;
  startBtn.textContent =
    err.code === 1 ? "Allow Location" :
    err.code === 2 ? "Location Error" :
    "Try Again";
}
</script>

</body>
</html>
