<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed</title>

<style>
  * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .container {
    text-align: center;
  }

  .speed {
    font-size: 90px;
    font-weight: 700;
    letter-spacing: 3px;
    transition: all 0.2s ease;
  }

  .unit {
    font-size: 16px;
    opacity: 0.6;
    margin-top: -10px;
  }

  .status {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.6;
  }

  .btn {
    margin-top: 30px;
    padding: 12px 24px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:active {
    transform: scale(0.95);
  }
</style>
</head>

<body>

<div class="container">
  <div id="speed" class="speed">0</div>
  <div class="unit">km/h</div>
  <div id="status" class="status">Tap Start</div>
  <button class="btn" onclick="startTracking()">Start Tracking</button>
</div>

<script>
let lastSpeed = 0;
let watchId = null;

function startTracking() {
  if (!navigator.geolocation) {
    updateStatus("GPS not supported");
    return;
  }

  updateStatus("Requesting permission...");

  watchId = navigator.geolocation.watchPosition(
    updateSpeed,
    handleError,
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }
  );
}

function updateSpeed(position) {
  let speed = position.coords.speed;

  if (speed === null) {
    updateStatus("Calibrating...");
    return;
  }

  speed = speed * 3.6;
  lastSpeed += (speed - lastSpeed) * 0.2;

  document.getElementById("speed").innerText = Math.round(lastSpeed);
  updateStatus("Tracking...");
}

function handleError(err) {
  if (err.code === 1) {
    updateStatus("Permission denied. Enable location in browser settings.");
  } else if (err.code === 2) {
    updateStatus("Location unavailable");
  } else {
    updateStatus("Timeout. Try again outdoors.");
  }
}

function updateStatus(msg) {
  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
